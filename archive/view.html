<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI News — Archive</title>
  <style>
    :root {
      --bg: #fafaf9;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #2563eb;
      --border: #e7e5e4;
      --tag-today-bg: #f5f5f4;
      --tag-today-text: #57534e;
      --tag-yesterday-bg: #f5f5f4;
      --tag-yesterday-text: #57534e;
      --tag-date-bg: #f5f5f4;
      --tag-date-text: #57534e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0a09;
        --text: #fafaf9;
        --muted: #a8a29e;
        --accent: #60a5fa;
        --border: #292524;
        --tag-today-bg: #292524;
        --tag-today-text: #a8a29e;
        --tag-yesterday-bg: #292524;
        --tag-yesterday-text: #a8a29e;
        --tag-date-bg: #292524;
        --tag-date-text: #a8a29e;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 1.5rem;
      max-width: 640px;
      margin: 0 auto;
    }
    header {
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    header a { font-size: 0.875rem; color: var(--accent); text-decoration: none; }
    header a:hover { text-decoration: underline; }
    #date-line { font-size: 0.875rem; color: var(--muted); margin-bottom: 1.5rem; }
    .story { margin-bottom: 1.75rem; padding-bottom: 1.75rem; border-bottom: 1px solid var(--border); }
    .story:last-child { border-bottom: none; }
    .story h2 { font-size: 1.05rem; font-weight: 600; line-height: 1.35; margin-bottom: 0.35rem; }
    .story .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .tag { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 9999px; letter-spacing: 0.02em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
    .tag-today, .tag-yesterday, .tag-date { background: var(--tag-date-bg); color: var(--tag-date-text); }
    .story p { font-size: 0.925rem; margin-bottom: 0.5rem; }
    .story .links { font-size: 0.825rem; }
    .story .links a { color: var(--accent); text-decoration: none; margin-right: 0.75rem; padding: 0.2rem 0; display: inline-block; }
    .story .links a:hover { text-decoration: underline; }
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>AI News</h1>
    <a href="./">Back to Archive</a>
  </header>
  <div id="date-line"></div>
  <div id="content"></div>
  <footer>Curated daily by Claude. Sources managed by Patrick.</footer>

  <script>
    async function loadArchiveEntry() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get('file');
      if (!file) { document.getElementById('content').innerHTML = '<p>No file specified.</p>'; return; }

      try {
        const res = await fetch(file + '?t=' + Date.now());
        if (!res.ok) throw new Error('not found');
        const text = await res.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const dateLine = doc.getElementById('date-line');
        const content = doc.getElementById('content');
        if (dateLine) document.getElementById('date-line').textContent = dateLine.textContent;
        if (content) document.getElementById('content').innerHTML = content.innerHTML;
        document.title = doc.title || 'AI News — Archive';
      } catch (e) {
        document.getElementById('content').innerHTML = '<p>Briefing not found.</p>';
      }
    }

    loadArchiveEntry();
  </script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
